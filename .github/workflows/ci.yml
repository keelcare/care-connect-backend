name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
      JWT_SECRET: dummy_secret
      PORT: 4000
      NODE_ENV: test
      # Dummy values for external services to prevent crash on startup if validated
      GOOGLE_MAPS_API_KEY: dummy_key
      GOOGLE_CLIENT_ID: dummy_id
      GOOGLE_CLIENT_SECRET: dummy_secret
      GOOGLE_CALLBACK_URL: http://localhost:4000/auth/google/callback
      CLOUDINARY_API_KEY: dummy_key
      CLOUDINARY_API_SECRET: dummy_secret
      RAZORPAY_KEY_ID: dummy_key
      RAZORPAY_KEY_SECRET: dummy_secret

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Run Database Migrations
        run: npx prisma migrate deploy

      - name: Seed Database
        run: npx prisma db seed

      - name: Run Unit Tests
        run: npm run test

      - name: Run E2E Tests
        run: npm run test:e2e
